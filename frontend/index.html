<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreenRoad Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,300;1,300&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="brand-logo">
      <img src="./images/logo.svg" alt="GreenRoad Logo" />
    </div>

    <div class="top-controls">
      <div class="control-pill lang-switch">
        <span class="active">UA</span>
        <span class="separator">|</span>
        <span>EN</span>
      </div>

      <div class="control-pill theme-switch">
        <svg
          class="moon-icon"
          viewBox="0 0 24 24"
          width="16"
          height="16"
          stroke="currentColor"
          stroke-width="2"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>

        <div class="active-sun">
          <svg
            class="sun-icon"
            viewBox="0 0 24 24"
            width="14"
            height="14"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </div>
      </div>
    </div>

    <div class="login-card">
      <h2>Вхід в систему</h2>

      <div class="input-group">
        <input type="text" placeholder="Електронна пошта" />
      </div>

      <div class="input-group">
        <input type="password" placeholder="Пароль" />
        <a href="#" class="forgot-password">Забули пароль?</a>
      </div>

      <button class="login-btn">УВІЙТИ</button>

      <button class="google-btn">
        <img
          src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/google/google-original.svg"
          alt="Google logo"
        />
        <span>Продовжити з Google</span>
      </button>

      <div class="signup-link">
        Немає акаунта? <a href="#">Зареєструватися</a>
      </div>

      <div class="divider"></div>

      <div class="secure-text">
        <svg
          width="14"
          height="16"
          viewBox="0 0 14 16"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M7 0L0 2.8V7.7C0 11.76 3.01 15.54 7 16C10.99 15.54 14 11.76 14 7.7V2.8L7 0ZM7 14.42C4.13 13.97 1.87 11.06 1.5 7.97V4L7 1.93L12.5 4V7.97C12.13 11.06 9.87 13.97 7 14.42ZM6.38 10.5L3.62 7.75L4.68 6.69L6.38 8.39L9.32 5.45L10.38 6.51L6.38 10.5Z"
            fill="#94A3B8"
          />
        </svg>
        <span>End-to-end encrypted</span>
      </div>
    </div>

    <script src="app.js"></script>

    <script>
    // Знаходимо нашу кнопку перемикання теми
    const themeBtn = document.querySelector('.theme-switch');

    // Вішаємо "слухача": коли на кнопку клікають, виконується ця функція
    themeBtn.addEventListener('click', () => {
      // Додаємо або забираємо клас 'dark-theme' у тега body
      document.body.classList.toggle('dark-theme');
    });
  </script>

  </body>
</html>
